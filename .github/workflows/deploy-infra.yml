name: Deploy Azure Infrastructure

on:
  push:
    branches: ["main"]
    paths: ["terraform/**"] # Only triggers if files in the terraform folder change

permissions:
  id-token: write # Mandatory for secure OIDC handshakes
  contents: read

jobs:
  terraform-deploy:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ./terraform
    steps:
      - name: Checkout Source Code
        uses: actions/checkout@v4

      # Log into Azure using the OIDC Federated Identity tokens
      - name: Authenticate to Microsoft Azure
        uses: azure/login@v2  # Microsoft's packaged login script
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      # Install the Terraform CLI on the runner
      - name: Install Terraform CLI
        uses: hashicorp/setup-terraform@v3

      - name: Terraform Init
        run: terraform init

      - name: Terraform Plan
        run: terraform plan

      - name: Terraform Apply
        run: terraform apply -auto-approve